notes:
  - The shared manifest contract is intentionally additive and opt-in for the API server via NOVACRON_RUNTIME_MANIFEST_PATH.
  - The canonical daemon still accepts its legacy daemon-only YAML shape so the existing runtime tests and operator configs remain valid during the convergence program.
  - Runtime-backed canonical monitoring summary reads are now available behind CANONICAL_RUNTIME_MONITORING_READS=true and CANONICAL_RUNTIME_BASE_URL=<daemon-base-url>.
  - The canonical daemon now exposes /internal/runtime/v1/monitoring/metrics with the canonical monitoring summary JSON shape, and the canonical API server can proxy that payload with runtime/sql-fallback source headers.
  - Runtime-backed VM, monitoring inventory, and network reads remain deferred pending novacron-0ex to converge the source of truth before cutover.
