name: E2E Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/src/__tests__/**"
      - "frontend/src/contexts/RBACContext.tsx"
      - "frontend/src/lib/auth.ts"
      - "frontend/src/lib/api/security.ts"
      - "frontend/src/hooks/useWebSocket.ts"
      - "frontend/src/hooks/useSecurity.ts"
      - "frontend/src/components/auth/**"
      - "frontend/src/app/admin/**"
      - ".github/workflows/e2e-tests.yml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "frontend/src/__tests__/**"
      - "frontend/src/contexts/RBACContext.tsx"
      - "frontend/src/lib/auth.ts"
      - "frontend/src/lib/api/security.ts"
      - "frontend/src/hooks/useWebSocket.ts"
      - "frontend/src/hooks/useSecurity.ts"
      - "frontend/src/components/auth/**"
      - "frontend/src/app/admin/**"
      - ".github/workflows/e2e-tests.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  canonical-ui-smoke:
    name: Canonical UI Smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run canonical auth and security smoke tests
        working-directory: frontend
        env:
          CI: "true"
        run: >
          npm test -- --runTestsByPath
          src/__tests__/app/admin-layout.test.tsx
          src/__tests__/components/auth/RBACGuard.test.tsx
          src/__tests__/hooks/useSecurity.test.tsx
          src/__tests__/hooks/useWebSocket.test.tsx
          src/__tests__/lib/security-api.test.ts
          src/__tests__/lib/auth.test.ts
          src/__tests__/lib/auth-phase3.test.ts
          --coverage=false