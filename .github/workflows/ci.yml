name: CI - Canonical Verification

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  canonical-backend:
    name: Canonical Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: go.mod

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build canonical API server
        run: go build ./backend/cmd/api-server

      - name: Run canonical backend tests
        run: >
          go test
          ./backend/cmd/api-server
          ./backend/api/graphql
          ./backend/api/security
          ./backend/api/websocket

  canonical-frontend:
    name: Canonical Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run canonical frontend lane
        working-directory: frontend
        env:
          CI: "true"
        run: npm run ci:canonical
