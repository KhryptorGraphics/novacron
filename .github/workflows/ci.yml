name: CI - Canonical Verification

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  GO_VERSION: "1.21"
  NODE_VERSION: "20"

jobs:
  canonical-backend:
    name: Canonical Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build canonical API server
        run: go build ./backend/cmd/api-server

      - name: Run canonical backend tests
        run: >
          go test
          ./backend/cmd/api-server
          ./backend/api/graphql
          ./backend/api/security
          ./backend/api/websocket

  canonical-frontend:
    name: Canonical Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run canonical frontend tests
        working-directory: frontend
        env:
          CI: "true"
        run: >
          npm test -- --runTestsByPath
          src/__tests__/app/dashboard-page.test.tsx
          src/__tests__/app/vms-page.test.tsx
          src/__tests__/app/analytics-page.test.tsx
          src/__tests__/app/settings-page.test.tsx
          src/__tests__/app/users-page.test.tsx
          src/__tests__/app/network-page.test.tsx
          src/__tests__/app/admin-layout.test.tsx
          src/__tests__/components/auth/RBACGuard.test.tsx
          src/__tests__/hooks/useSecurity.test.tsx
          src/__tests__/hooks/useWebSocket.test.tsx
          src/__tests__/lib/security-api.test.ts
          src/__tests__/lib/auth.test.ts
          src/__tests__/lib/auth-phase3.test.ts
          --coverage=false

      - name: Build canonical frontend
        working-directory: frontend
        run: npm run build