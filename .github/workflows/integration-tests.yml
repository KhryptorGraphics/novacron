name: Integration Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/cmd/api-server/**"
      - ".github/workflows/integration-tests.yml"
      - ".github/workflows/ci.yml"
  push:
    branches: [main, develop]
    paths:
      - "backend/cmd/api-server/**"
      - ".github/workflows/integration-tests.yml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  GO_VERSION: "1.21"

jobs:
  canonical-route-contract:
    name: Canonical Route Contract
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run canonical route contract tests
        run: >
          go test ./backend/cmd/api-server -run
          'TestRequireAuth|TestRegisterPublicRoutesSupportsCanonicalEmailLogin|TestRegisterSecureAPIRoutesListsVMsOnCanonicalRoute|TestRegisterSecureAPIRoutesCreatesVMOnCompatibilityRoute|TestRegisterSecureAPIRoutesSupportsStateTransitionsAndMetrics|TestAPIInfoAdvertisesCanonicalContract|TestRegisterExplicitlyUnsupportedRoutesReturnsNotImplemented'
